<script>
// Register the offline-first service worker. The SW pre-caches the app shell
// on install and lazily caches Bible verse JSON / fonts as they are fetched,
// so a second visit works with no network. Marks/panels/settings live in
// localStorage and are unaffected by SW updates.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(err => {
      console.warn("CODEX: service worker registration failed", err);
    });
  });
}
</script>
